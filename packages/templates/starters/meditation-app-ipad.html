<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: oklch(0.14 0.03 220);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Sans', sans-serif;
}
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}
@keyframes pulse-ring {
  0%   { transform: scale(1); opacity: 0.45; }
  100% { transform: scale(1.55); opacity: 0; }

  0%,100% { box-shadow: 0 0 40px 0px oklch(0.62 0.14 160 / 0.25); }

<body>
<script type="text/babel">

// ── Tokens ───────────────────────────────────────────────────
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "showSubtitles": true,
  "sidebarWidth": 300,
  "accentGreen": "oklch(0.48 0.12 160)",
  "accentBlue": "oklch(0.52 0.12 220)"
}/*EDITMODE-END*/;

const serif = "'DM Serif Display', serif";
const sans  = "'DM Sans', sans-serif";
const c = {
  bg:      "oklch(0.97 0.015 160)",
  sidebar: "oklch(0.99 0.01 160)",
  card:    "oklch(1 0 0 / 0.85)",
  green:   "oklch(0.48 0.12 160)",
  greenL:  "oklch(0.88 0.08 160)",
  blue:    "oklch(0.52 0.12 220)",
  blueL:   "oklch(0.88 0.08 220)",
  text:    "oklch(0.20 0.02 180)",
  muted:   "oklch(0.50 0.04 180)",
  line:    "oklch(0.90 0.025 170)",
  sideHL:  "oklch(0.93 0.04 160)",
};

// ── Data ─────────────────────────────────────────────────────
const sessions = [
  { id:1, title:"Morning Stillness",  subtitle:"Start your day with clarity",    duration:"10 min", durationSec:600,  category:"Breathe", streak:4, progress:0.65, color:"oklch(0.72 0.13 168)", icon:"🌿", desc:"A gentle breath-led practice to ease you into the morning. Let awareness settle like morning light on still water.", teacher:"Mei Lin", level:"Beginner" },
  { id:2, title:"Ocean Drift",        subtitle:"Deep rest and restoration",       duration:"20 min", durationSec:1200, category:"Sleep",   streak:7, progress:0.30, color:"oklch(0.72 0.13 220)", icon:"🌊", desc:"Ride long waves of breath into deep, restorative rest. Ideal for winding down before sleep or an afternoon reset.", teacher:"Taro Kato", level:"All levels" },
  { id:3, title:"Body Scan",          subtitle:"Release held tension",            duration:"15 min", durationSec:900,  category:"Body",    streak:2, progress:0.80, color:"oklch(0.72 0.13 140)", icon:"🍃", desc:"Move slowly through the body, noticing sensation without judgement. A classic practice for releasing physical holding.", teacher:"Mei Lin", level:"All levels" },
  { id:4, title:"Loving Kindness",    subtitle:"Open the heart gently",          duration:"12 min", durationSec:720,  category:"Heart",   streak:1, progress:0.10, color:"oklch(0.78 0.13 60)",  icon:"☀️", desc:"Cultivate warmth toward yourself and others through age-old phrases of goodwill. Leave feeling quietly expansive.", teacher:"Sara Osei", level:"Intermediate" },
  { id:5, title:"Evening Unwind",     subtitle:"Let the day dissolve",           duration:"8 min",  durationSec:480,  category:"Breathe",streak:5, progress:0.50, color:"oklch(0.72 0.13 280)", icon:"🌙", desc:"A short, effective practice for transitioning out of the day. Soften the shoulders; the day is done.", teacher:"Taro Kato", level:"Beginner" },
  { id:6, title:"Clear Seeing",       subtitle:"Sharpen focus, soften grip",     duration:"18 min", durationSec:1080, category:"Focus",   streak:0, progress:0,    color:"oklch(0.72 0.13 30)",  icon:"✨", desc:"Concentration practice that trains steady attention while cultivating an attitude of ease around thoughts.", teacher:"Sara Osei", level:"Intermediate" },
];

const weekDays = ["M","T","W","T","F","S","S"];
const weekDone  = [true,true,false,true,true,false,false];

// ── iPad bezel ────────────────────────────────────────────────
function IPadFrame({ children, width=1024, height=768 }) {
  const bezelH = 36, bezelV = 26, r = 22, camR = 5;
  return (
    <div style={{
      width: width + bezelH*2,
      height: height + bezelV*2,
      borderRadius: r + bezelH,
      background: "linear-gradient(160deg, #2a2a2e 0%, #1a1a1e 60%, #111114 100%)",
      padding: `${bezelV}px ${bezelH}px`,
      boxShadow: "0 60px 120px rgba(0,0,0,0.55), 0 0 0 1.5px rgba(255,255,255,0.09), inset 0 1px 0 rgba(255,255,255,0.08)",
      position: "relative",
      flexShrink: 0,
    }}>
      {/* camera */}
      <div style={{ position:"absolute", top: bezelV/2 - camR, left:"50%", transform:"translateX(-50%)", width:camR*2, height:camR*2, borderRadius:"50%", background:"#111", border:"1.5px solid #333" }}/>
      {/* home bar */}
      <div style={{ position:"absolute", bottom:8, left:"50%", transform:"translateX(-50%)", width:130, height:4, borderRadius:2, background:"rgba(255,255,255,0.18)" }}/>
      <div style={{ width, height, borderRadius: r, overflow:"hidden", position:"relative" }}>
        {children}
      </div>
    </div>
  );
}

// ── iPad status bar ───────────────────────────────────────────
function IPadStatusBar() {
  return (
    <div style={{ height:24, background:"transparent", display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0 20px", position:"absolute", top:0, left:0, right:0, zIndex:30 }}>
      <span style={{ fontFamily:sans, fontSize:12, fontWeight:500, color:c.muted }}>9:41</span>
      <div style={{ display:"flex", gap:8, alignItems:"center" }}>
        <svg width="16" height="10" viewBox="0 0 19 12"><rect x="0" y="6" width="3" height="6" rx="0.7" fill={c.muted}/><rect x="4.8" y="4" width="3" height="8" rx="0.7" fill={c.muted}/><rect x="9.6" y="2" width="3" height="10" rx="0.7" fill={c.muted}/><rect x="14.4" y="0" width="3" height="12" rx="0.7" fill={c.muted}/></svg>
        <svg width="14" height="10" viewBox="0 0 17 12"><path d="M8.5 3.2C10.8 3.2 12.9 4.1 14.4 5.6L15.5 4.5C13.7 2.7 11.2 1.5 8.5 1.5C5.8 1.5 3.3 2.7 1.5 4.5L2.6 5.6C4.1 4.1 6.2 3.2 8.5 3.2Z" fill={c.muted}/><path d="M8.5 6.8C9.9 6.8 11.1 7.3 12 8.2L13.1 7.1C11.8 5.9 10.2 5.1 8.5 5.1C6.8 5.1 5.2 5.9 3.9 7.1L5 8.2C5.9 7.3 7.1 6.8 8.5 6.8Z" fill={c.muted}/><circle cx="8.5" cy="10.5" r="1.5" fill={c.muted}/></svg>
        <svg width="24" height="12" viewBox="0 0 27 13"><rect x="0.5" y="0.5" width="23" height="12" rx="3.5" stroke={c.muted} strokeOpacity="0.4" fill="none"/><rect x="2" y="2" width="20" height="9" rx="2" fill={c.muted}/></svg>
      </div>
    </div>
  );
}

// ── Sidebar nav item ──────────────────────────────────────────
function NavItem({ icon, label, active, onClick, badge }) {
  return (
    <button onClick={onClick} style={{
      width:"100%", background: active ? c.sideHL : "none", border:"none", cursor:"pointer",
      borderRadius:12, padding:"10px 14px", display:"flex", alignItems:"center", gap:12,
      color: active ? c.green : c.muted, transition:"all 0.15s", textAlign:"left",
    }}>
      <div style={{ width:24, display:"flex", justifyContent:"center", flexShrink:0 }}>{icon}</div>
      <span style={{ fontFamily:sans, fontSize:14, fontWeight: active ? 500 : 400, flex:1 }}>{label}</span>
      {badge && <div style={{ background:c.green, color:"#fff", borderRadius:10, fontSize:11, fontWeight:600, padding:"1px 7px" }}>{badge}</div>}
    </button>
  );
}

// ── Session row in sidebar ────────────────────────────────────
function SessionRow({ s, active, onClick, showSubtitles }) {
  return (
    <div onClick={onClick} style={{
      display:"flex", alignItems:"center", gap:12, padding:"10px 14px",
      borderRadius:14, cursor:"pointer", background: active ? c.sideHL : "none",
      transition:"background 0.15s",
    }}
    onMouseEnter={e => { if (!active) e.currentTarget.style.background = "oklch(0.95 0.02 160)"; }}
    onMouseLeave={e => { if (!active) e.currentTarget.style.background = "none"; }}
    >
      <div style={{ width:38, height:38, borderRadius:12, background:s.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:18, flexShrink:0 }}>{s.icon}</div>
      <div style={{ flex:1, minWidth:0 }}>
        <div style={{ fontFamily:sans, fontSize:13, fontWeight:500, color: active ? c.green : c.text, whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>{s.title}</div>
        <div style={{ fontFamily:sans, fontSize:11, color:c.muted, marginTop:1 }}>{s.duration}</div>
        <div style={{ marginTop:5, background:c.line, borderRadius:3, height:2.5, overflow:"hidden" }}>
          <div style={{ height:"100%", borderRadius:3, background:s.color, width:`${s.progress*100}%` }}/>
        </div>
      </div>
    </div>
  );
}

// ── Detail panel ──────────────────────────────────────────────
function DetailPanel({ session, tweaks }) {
  const [playing, setPlaying] = React.useState(false);
  const [elapsed, setElapsed] = React.useState(() => Math.round(session.progress * session.durationSec));
  const total = session.durationSec;

  React.useEffect(() => {
    setPlaying(false);
    setElapsed(Math.round(session.progress * session.durationSec));
  }, [session.id]);

  React.useEffect(() => {
    if (!playing) return;
    const id = setInterval(() => setElapsed(e => Math.min(e+1, total)), 1000);
    return () => clearInterval(id);
  }, [playing, total]);

  const pct = elapsed / total;
  const R = 90, circ = 2 * Math.PI * R;
  const mins = String(Math.floor(elapsed/60)).padStart(2,"0");
  const secs = String(elapsed % 60).padStart(2,"0");

  const relatedSessions = sessions.filter(s => s.id !== session.id).slice(0,3);

  return (
    <div style={{ height:"100%", display:"flex", flexDirection:"column", background:c.bg, overflowY:"auto", paddingBottom:30 }}>
      {/* hero banner */}
      <div style={{ background:`linear-gradient(135deg, ${session.color}55 0%, ${c.blueL}88 100%)`, padding:"52px 48px 36px", position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", top:-40, right:-40, width:200, height:200, borderRadius:"50%", background:`${session.color}22` }}/>
        <div style={{ position:"absolute", bottom:-60, right:80, width:150, height:150, borderRadius:"50%", background:`${c.blue}18` }}/>

        <div style={{ display:"flex", gap:40, alignItems:"flex-start", position:"relative" }}>
          {/* left: info */}
          <div style={{ flex:1 }}>
            <div style={{ display:"flex", gap:8, marginBottom:14 }}>
              <span style={{ background:`${session.color}33`, color:c.text, fontFamily:sans, fontSize:11, fontWeight:500, borderRadius:8, padding:"3px 10px", textTransform:"uppercase", letterSpacing:"0.06em" }}>{session.category}</span>
              <span style={{ background:`${c.line}`, color:c.muted, fontFamily:sans, fontSize:11, borderRadius:8, padding:"3px 10px" }}>{session.level}</span>
            </div>
            <div style={{ fontFamily:serif, fontSize:38, color:c.text, lineHeight:1.1, marginBottom:10 }}>{session.title}</div>
            {tweaks.showSubtitles && <div style={{ fontFamily:sans, fontSize:15, color:c.muted, lineHeight:1.6, maxWidth:360 }}>{session.desc}</div>}
            <div style={{ display:"flex", gap:24, marginTop:20 }}>
              {[["Teacher", session.teacher], ["Duration", session.duration], ["Streak", `${session.streak} days`]].map(([k,v]) => (
                <div key={k}>
                  <div style={{ fontFamily:sans, fontSize:11, color:c.muted, textTransform:"uppercase", letterSpacing:"0.05em" }}>{k}</div>
                  <div style={{ fontFamily:sans, fontSize:14, fontWeight:500, color:c.text, marginTop:2 }}>{v}</div>
                </div>
              ))}
            </div>
          </div>

          {/* right: ring player */}
          <div style={{ display:"flex", flexDirection:"column", alignItems:"center", gap:20, flexShrink:0 }}>
            <div style={{ position:"relative", width:220, height:220 }}>
              {playing && <div style={{ position:"absolute", inset:0, borderRadius:"50%", border:`3px solid ${session.color}`, animation:"pulse-ring 2.2s ease-out infinite" }}/>}
              <svg width="220" height="220" style={{ transform:"rotate(-90deg)", animation: playing ? "breatheGlow 4s ease-in-out infinite" : "none" }}>
                <circle cx="110" cy="110" r={R} fill="none" stroke={c.line} strokeWidth="8"/>
                <circle cx="110" cy="110" r={R} fill="none" stroke={session.color} strokeWidth="8"
                  strokeLinecap="round"
                  strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)}
                  style={{ transition:"stroke-dashoffset 1s linear" }}/>
              </svg>
              <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
                <div style={{ fontSize:40 }}>{session.icon}</div>
                <div style={{ fontFamily:sans, fontSize:34, fontWeight:300, color:c.text, letterSpacing:"-0.02em", marginTop:6 }}>{mins}:{secs}</div>
                <div style={{ fontFamily:sans, fontSize:12, color:c.muted }}>{session.duration}</div>
              </div>
            </div>

            {/* controls */}
            <div style={{ display:"flex", alignItems:"center", gap:16 }}>
              <button onClick={() => setElapsed(e => Math.max(0,e-15))} style={{ width:44, height:44, borderRadius:"50%", background:c.card, border:`1px solid ${c.line}`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={c.muted} strokeWidth="2" strokeLinecap="round"><path d="M12 8V4M8 8L4 4M12 8c-3.3 0-6 2.7-6 6s2.7 6 6 6 6-2.7 6-6"/><text x="8.5" y="16" fontSize="7" fill={c.muted} fontFamily="sans-serif" stroke="none">15</text></svg>
              </button>
              <button onClick={() => setPlaying(p=>!p)} style={{
                width:64, height:64, borderRadius:"50%", border:"none", cursor:"pointer",
                background:`linear-gradient(135deg, ${session.color}, oklch(0.42 0.12 180))`,
                display:"flex", alignItems:"center", justifyContent:"center",
                boxShadow:`0 8px 28px ${session.color}55`,
                transition:"transform 0.12s, box-shadow 0.12s",
              }}
              onMouseDown={e => e.currentTarget.style.transform="scale(0.94)"}
              onMouseUp={e => e.currentTarget.style.transform="scale(1)"}
              >
                {playing
                  ? <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><rect x="5" y="4" width="4.5" height="16" rx="1.5"/><rect x="14.5" y="4" width="4.5" height="16" rx="1.5"/></svg>
                  : <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M6 4l14 8-14 8V4z"/></svg>
                }
              </button>
              <button onClick={() => setElapsed(e => Math.min(total, e+15))} style={{ width:44, height:44, borderRadius:"50%", background:c.card, border:`1px solid ${c.line}`, cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center" }}>
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={c.muted} strokeWidth="2" strokeLinecap="round"><path d="M12 8V4M16 8l4-4M12 8c3.3 0 6 2.7 6 6s-2.7 6-6 6-6-2.7-6-6"/><text x="8.5" y="16" fontSize="7" fill={c.muted} fontFamily="sans-serif" stroke="none">15</text></svg>
              </button>
            </div>
          </div>
        </div>
      </div>

      {/* body */}
      <div style={{ padding:"32px 48px", display:"flex", gap:28, flex:1 }}>
        {/* left col */}
        <div style={{ flex:1, display:"flex", flexDirection:"column", gap:20 }}>
          {/* intention card */}
          <div style={{ background:c.card, borderRadius:20, padding:"22px 24px", border:`1px solid ${c.line}` }}>
            <div style={{ fontFamily:serif, fontSize:17, color:c.green, marginBottom:8 }}>Today's intention</div>
            <div style={{ fontFamily:sans, fontSize:14, color:c.muted, lineHeight:1.7 }}>
              Breathe gently. Let each exhale release what you no longer need to carry. Notice without judgement.
            </div>
          </div>

          {/* progress detail */}
          <div style={{ background:c.card, borderRadius:20, padding:"22px 24px", border:`1px solid ${c.line}` }}>
            <div style={{ fontFamily:sans, fontSize:11, color:c.muted, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:16 }}>Session progress</div>
            <div style={{ display:"flex", gap:16 }}>
              {[["Completed", `${Math.round(pct*100)}%`], ["Remaining", `${Math.floor((total-elapsed)/60)}m ${(total-elapsed)%60}s`], ["Streak", `${session.streak}d`]].map(([k,v]) => (
                <div key={k} style={{ flex:1, background:c.bg, borderRadius:14, padding:"14px", textAlign:"center" }}>
                  <div style={{ fontFamily:serif, fontSize:22, color:c.text }}>{v}</div>
                  <div style={{ fontFamily:sans, fontSize:11, color:c.muted, marginTop:3 }}>{k}</div>
                </div>
              ))}
            </div>
            <div style={{ marginTop:16, background:c.line, borderRadius:6, height:6, overflow:"hidden" }}>
              <div style={{ height:"100%", borderRadius:6, background:`linear-gradient(90deg, ${session.color}, ${c.blue})`, width:`${pct*100}%`, transition:"width 1s linear" }}/>
            </div>
          </div>
        </div>

        {/* right col: up next */}
        <div style={{ width:240, flexShrink:0 }}>
          <div style={{ fontFamily:sans, fontSize:11, color:c.muted, textTransform:"uppercase", letterSpacing:"0.06em", marginBottom:14 }}>Up next</div>
          <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
            {relatedSessions.map(s => (
              <div key={s.id} style={{ background:c.card, borderRadius:16, padding:"14px", border:`1px solid ${c.line}`, cursor:"pointer" }}>
                <div style={{ display:"flex", gap:10, alignItems:"center" }}>
                  <div style={{ width:36, height:36, borderRadius:10, background:s.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:16 }}>{s.icon}</div>
                  <div>
                    <div style={{ fontFamily:sans, fontSize:13, fontWeight:500, color:c.text }}>{s.title}</div>
                    <div style={{ fontFamily:sans, fontSize:11, color:c.muted }}>{s.duration}</div>
                  </div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Progress view ─────────────────────────────────────────────
function ProgressView() {
  const bars = [38, 52, 0, 60, 45, 0, 0];
  const months = ["Jan","Feb","Mar","Apr"];
  const monthVals = [320, 410, 380, 147];

  return (
    <div style={{ height:"100%", overflowY:"auto", background:c.bg, padding:"52px 48px 40px" }}>
      <div style={{ fontFamily:serif, fontSize:36, color:c.text, marginBottom:6 }}>Your <em>journey</em></div>
      <div style={{ fontFamily:sans, fontSize:14, color:c.muted, marginBottom:36 }}>April 2026</div>

      <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:24 }}>
        {/* weekly bars */}
        <div style={{ background:c.card, borderRadius:24, padding:"28px", border:`1px solid ${c.line}`, gridColumn:"1 / -1" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline", marginBottom:24 }}>
            <div style={{ fontFamily:sans, fontSize:13, fontWeight:500, color:c.text }}>This week</div>
            <div style={{ fontFamily:serif, fontSize:20, color:c.green }}>147 min</div>
          </div>
          <div style={{ display:"flex", alignItems:"flex-end", gap:14, height:120 }}>
            {bars.map((h,i) => (
              <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:8 }}>
                <div style={{ width:"100%", height:h ? `${h}%` : "8px", borderRadius:"8px 8px 0 0", background: weekDone[i] ? `linear-gradient(180deg, ${c.green}, ${c.blue})` : c.line, transition:"height 0.6s ease", minHeight:8 }}/>
                <div style={{ fontFamily:sans, fontSize:12, color:c.muted }}>{weekDays[i]}</div>
              </div>
            ))}
          </div>
        </div>

        {/* stats */}
        {[
          { label:"Total sessions", value:"24", unit:"sessions", icon:"🧘" },
          { label:"Total minutes",  value:"1,157", unit:"min",   icon:"⏱️" },
          { label:"Current streak", value:"7",   unit:"days",    icon:"🔥" },
          { label:"Avg / session",  value:"12",  unit:"min",     icon:"📊" },
        ].map((s,i) => (
          <div key={i} style={{ background:c.card, borderRadius:20, padding:"22px 24px", border:`1px solid ${c.line}`, display:"flex", gap:16, alignItems:"center" }}>
            <div style={{ width:48, height:48, borderRadius:16, background:c.sideHL, display:"flex", alignItems:"center", justifyContent:"center", fontSize:22 }}>{s.icon}</div>
            <div>
              <div style={{ fontFamily:sans, fontSize:11, color:c.muted, textTransform:"uppercase", letterSpacing:"0.05em" }}>{s.label}</div>
              <div style={{ fontFamily:serif, fontSize:28, color:c.text, marginTop:2 }}>{s.value}<span style={{ fontFamily:sans, fontSize:12, color:c.muted, marginLeft:4 }}>{s.unit}</span></div>
            </div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem("cs_ipad_tweaks") || "{}") }; }
    catch { return TWEAK_DEFAULTS; }
  });
  const [activeSession, setActiveSession] = React.useState(sessions[0]);
  const [activeNav, setActiveNav] = React.useState("sessions");
  const [showTweaks, setShowTweaks] = React.useState(false);
  const [scale, setScale] = React.useState(1);

  React.useEffect(() => { localStorage.setItem("cs_ipad_tweaks", JSON.stringify(tweaks)); }, [tweaks]);

  // Scale to fit viewport
  React.useEffect(() => {
    const update = () => {
      const totalW = 1024 + 36*2 + 80; // bezel + padding
      const totalH = 768  + 26*2 + 80;
      setScale(Math.min(1, window.innerWidth / totalW, window.innerHeight / totalH));
    };
    update();
    window.addEventListener("resize", update);
    return () => window.removeEventListener("resize", update);
  }, []);

  // Tweaks bridge
  React.useEffect(() => {
    const h = e => {
      if (e.data?.type === "__activate_edit_mode")   setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message", h);
    window.parent.postMessage({ type:"__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", h);
  }, []);

  const updateTweak = (k, v) => {
    setTweaks(t => {
      const next = { ...t, [k]: v };
      window.parent.postMessage({ type:"__edit_mode_set_keys", edits:{ [k]: v } }, "*");
      return next;
    });
  };

  const navIcons = {
    sessions: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M12 22C6.5 22 2 17.5 2 12S6.5 2 12 2s10 4.5 10 10-4.5 10-10 10z"/><path d="M10 8l6 4-6 4V8z" fill="currentColor" stroke="none"/></svg>,
    progress: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>,
    explore:  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M15 9l-4.5 1.5L9 15l4.5-1.5L15 9z"/></svg>,
    settings: <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>,
  };

  const totalMins = 147, streak = 7;

  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", minHeight:"100vh", background:"oklch(0.14 0.03 220)" }}>
      <div style={{ transform:`scale(${scale})`, transformOrigin:"center center" }}>
        <IPadFrame width={1024} height={768}>
          <div style={{ width:1024, height:768, display:"flex", background:c.bg, position:"relative" }}>
            <IPadStatusBar/>

            {/* sidebar */}
            <div style={{ width:tweaks.sidebarWidth, flexShrink:0, background:c.sidebar, borderRight:`1px solid ${c.line}`, display:"flex", flexDirection:"column", paddingTop:28, overflow:"hidden" }}>
              {/* logo */}
              <div style={{ padding:"16px 20px 24px" }}>
                <div style={{ fontFamily:serif, fontSize:22, color:c.text }}>Calm Spaces</div>
                <div style={{ fontFamily:sans, fontSize:12, color:c.muted, marginTop:1 }}>Find your stillness</div>
              </div>

              {/* streak pill */}
              <div style={{ margin:"0 14px 20px", background:`linear-gradient(135deg, ${c.green}, ${c.blue})`, borderRadius:16, padding:"12px 16px", color:"#fff" }}>
                <div style={{ fontFamily:sans, fontSize:11, opacity:0.8, letterSpacing:"0.04em", textTransform:"uppercase" }}>Current streak</div>
                <div style={{ fontFamily:serif, fontSize:26, lineHeight:1, marginTop:4 }}>{streak}<span style={{ fontSize:13, fontFamily:sans, fontWeight:300, marginLeft:4 }}>days</span></div>
                <div style={{ display:"flex", gap:5, marginTop:10 }}>
                  {weekDays.map((d,i) => (
                    <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
                      <div style={{ width:"100%", aspectRatio:"1", borderRadius:"50%", background: weekDone[i] ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.2)", display:"flex", alignItems:"center", justifyContent:"center" }}>
                        {weekDone[i] && <svg width="8" height="6" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke={c.green} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
                      </div>
                      <div style={{ fontSize:9, opacity:0.7, fontFamily:sans }}>{d}</div>
                    </div>
                  ))}
                </div>
              </div>

              {/* nav */}
              <div style={{ padding:"0 10px", display:"flex", flexDirection:"column", gap:2 }}>
                <NavItem icon={navIcons.sessions} label="Sessions"  active={activeNav==="sessions"}  onClick={() => setActiveNav("sessions")}/>
                <NavItem icon={navIcons.progress} label="Progress"  active={activeNav==="progress"}  onClick={() => setActiveNav("progress")}/>
                <NavItem icon={navIcons.explore}  label="Explore"   active={activeNav==="explore"}   onClick={() => setActiveNav("explore")}/>
              </div>

              {/* sessions list */}
              {activeNav === "sessions" && (
                <div style={{ flex:1, overflowY:"auto", marginTop:16, padding:"0 10px" }}>
                  <div style={{ fontFamily:sans, fontSize:10, color:c.muted, letterSpacing:"0.08em", textTransform:"uppercase", padding:"0 4px", marginBottom:8 }}>All sessions</div>
                  {sessions.map(s => (
                    <SessionRow key={s.id} s={s} active={activeSession?.id===s.id} onClick={() => setActiveSession(s)} showSubtitles={tweaks.showSubtitles}/>
                  ))}
                </div>
              )}

              {/* bottom nav item */}
              <div style={{ padding:"12px 10px 16px", borderTop:`1px solid ${c.line}`, marginTop:"auto" }}>
                <NavItem icon={navIcons.settings} label="Settings" active={false} onClick={() => {}}/>
              </div>
            </div>

            {/* main content */}
            <div style={{ flex:1, overflow:"hidden" }}>
              {activeNav === "sessions" && activeSession && <DetailPanel session={activeSession} tweaks={tweaks}/>}
              {activeNav === "progress" && <ProgressView/>}
              {activeNav === "explore" && (
                <div style={{ height:"100%", display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:12, background:c.bg }}>
                  <div style={{ fontSize:48 }}>🌿</div>
                  <div style={{ fontFamily:serif, fontSize:28, color:c.text }}>Coming soon</div>
                  <div style={{ fontFamily:sans, fontSize:14, color:c.muted }}>New guided sessions added every week</div>
                </div>
              )}
            </div>
          </div>
        </IPadFrame>
      </div>

      {/* tweaks */}
      {showTweaks && (
        <div style={{ position:"fixed", bottom:28, right:28, background:"white", borderRadius:20, padding:22, boxShadow:"0 12px 40px rgba(0,0,0,0.15)", width:240, zIndex:999, fontFamily:sans }}>
          <div style={{ fontWeight:500, fontSize:14, marginBottom:16, color:"#222" }}>Tweaks</div>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <label style={{ fontSize:12, color:"#555", display:"flex", justifyContent:"space-between", alignItems:"center" }}>
              Show subtitles
              <input type="checkbox" checked={tweaks.showSubtitles} onChange={e => updateTweak("showSubtitles", e.target.checked)}/>
            </label>
            <label style={{ fontSize:12, color:"#555" }}>
              Sidebar width: {tweaks.sidebarWidth}px
              <input type="range" min={240} max={380} step={10} value={tweaks.sidebarWidth} style={{ width:"100%", marginTop:6 }} onChange={e => updateTweak("sidebarWidth", +e.target.value)}/>
            </label>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<div id="root"></div>
<template id="__bundler_thumbnail">
<svg viewBox="0 0 120 90" xmlns="http://www.w3.org/2000/svg">
  <rect width="120" height="90" fill="oklch(0.96 0.02 160)"/>
  <rect x="5" y="5" width="30" height="80" rx="4" fill="oklch(0.99 0.01 160)" stroke="oklch(0.90 0.025 170)" strokeWidth="0.5"/>
  <rect x="37" y="5" width="78" height="80" rx="4" fill="white"/>
  <circle cx="76" cy="42" r="16" fill="none" stroke="oklch(0.48 0.12 160)" strokeWidth="3"/>
</svg>
</template>
</body>
</html>

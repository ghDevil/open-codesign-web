<title>Calm Spaces – Meditation App</title>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>

<script type="text/babel">

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentCyan": "oklch(0.78 0.16 200)",
  "accentAmber": "oklch(0.78 0.16 60)",
  "bgDepth": "oklch(0.10 0.9 240)",
  "showSubtitles": true
}/*EDITMODE-END*/;

// ── Data ──────────────────────────────────────────────────────
const sessions = [
  { id:1, title:"Morning Stillness", subtitle:"Start your day with clarity", duration:"10 min", category:"Breathe", streak:4, progress:0.65, color:"oklch(0.78 0.12 168)", icon:"🌿" },
  { id:2, title:"Ocean Drift",       subtitle:"Deep rest and restoration",  duration:"20 min", category:"Sleep",  streak:7, progress:0.30, color:"oklch(0.78 0.12 220)", icon:"🌊" },
  { id:3, title:"Body Scan",         subtitle:"Release held tension",       duration:"15 min", category:"Body",   streak:2, progress:0.80, color:"oklch(0.78 0.12 140)", icon:"🍃" },
  { id:4, title:"Loving Kindness",   subtitle:"Open the heart gently",      duration:"12 min", category:"Heart",  streak:1, progress:0.10, color:"oklch(0.78 0.12 60)",  icon:"☀️" },
  { id:5, title:"Evening Unwind",    subtitle:"Let the day dissolve",       duration:"8 min",  category:"Breathe",streak:5, progress:0.50, color:"oklch(0.78 0.12 280)", icon:"🌙" },
];

const weekDays = ["M","T","W","T","F","S","S"];
const weekDone  = [true, true, false, true, true, false, false];

// ── Helpers ───────────────────────────────────────────────────
const serif  = "'DM Serif Display', serif";
const sans   = "'DM Sans', sans-serif";

const c = {
  bg:     "oklch(0.97 0.015 160)",
  card:   "oklch(1 0 0 / 0.82)",
  green:  "oklch(0.48 0.12 160)",
  greenL: "oklch(0.88 0.08 160)",
  blue:   "oklch(0.52 0.12 220)",
  blueL:  "oklch(0.88 0.08 220)",
  text:   "oklch(0.22 0.02 180)",
  muted:  "oklch(0.52 0.04 180)",
  line:   "oklch(0.88 0.03 180)",

// ── Player screen ─────────────────────────────────────────────
function PlayerScreen({ session, onBack }) {
  const [playing, setPlaying] = React.useState(false);
  const [elapsed, setElapsed] = React.useState(Math.round(session.progress * 600));
  const total = 600;

  React.useEffect(() => {
    if (!playing) return;
    const id = setInterval(() => setElapsed(e => Math.min(e+1, total)), 1000);
    return () => clearInterval(id);
  }, [playing]);

  const pct = elapsed / total;
  const r = 70, circ = 2 * Math.PI * r;
  const mins = String(Math.floor(elapsed/60)).padStart(2,"0");
  const secs = String(elapsed % 60).padStart(2,"0");

  return (
    <div style={{ height:"100%", background:c.bg, display:"flex", flexDirection:"column", paddingTop:60 }}>
      {/* back */}
      <div style={{ padding:"0 24px 0", display:"flex", alignItems:"center" }}>
        <button onClick={onBack} style={{ background:"none", border:"none", cursor:"pointer", display:"flex", alignItems:"center", gap:6, color:c.muted, fontFamily:sans, fontSize:14 }}>
          <svg width="8" height="14" viewBox="0 0 8 14"><path d="M7 1L1 7l6 6" stroke="currentColor" strokeWidth="1.8" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>
          Back
        </button>
      </div>

      {/* hero */}
      <div style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", padding:"0 32px", gap:32 }}>
        <div style={{ textAlign:"center", animation:"fadeUp 0.5s ease both" }}>
          <div style={{ fontFamily:serif, fontSize:26, color:c.text, lineHeight:1.2 }}>{session.title}</div>
          <div style={{ fontFamily:sans, fontSize:13, color:c.muted, marginTop:6, letterSpacing:"0.04em", textTransform:"uppercase" }}>{session.category}</div>
        </div>

        {/* ring */}
        <div style={{ position:"relative", width:180, height:180, animation:"fadeUp 0.5s 0.1s ease both" }}>
          {playing && <div style={{ position:"absolute", inset:0, borderRadius:"50%", border:`3px solid ${session.color}`, animation:"pulse-ring 2s ease-out infinite" }}/>}
          <svg width="180" height="180" style={{ transform:"rotate(-90deg)" }}>
            <circle cx="90" cy="90" r={r} fill="none" stroke={c.line} strokeWidth="6"/>
            <circle cx="90" cy="90" r={r} fill="none" stroke={session.color} strokeWidth="6"
              strokeLinecap="round"
              strokeDasharray={circ} strokeDashoffset={circ * (1 - pct)}
              style={{ transition:"stroke-dashoffset 1s linear" }}/>
          </svg>
          <div style={{ position:"absolute", inset:0, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center" }}>
            <div style={{ fontSize:36, lineHeight:1 }}>{session.icon}</div>
            <div style={{ fontFamily:sans, fontSize:28, fontWeight:300, color:c.text, marginTop:8, letterSpacing:"-0.01em" }}>{mins}:{secs}</div>
            <div style={{ fontFamily:sans, fontSize:12, color:c.muted, marginTop:2 }}>{session.duration}</div>
          </div>
        </div>

        {/* controls */}
        <div style={{ display:"flex", alignItems:"center", gap:28, animation:"fadeUp 0.5s 0.2s ease both" }}>
          <button onClick={() => setElapsed(e => Math.max(0,e-15))} style={{ background:c.card, border:"none", cursor:"pointer", width:44, height:44, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(12px)" }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={c.muted} strokeWidth="1.8" strokeLinecap="round"><path d="M12 19V5M5 12l7-7 7 7"/><text x="4" y="22" fontSize="8" fill={c.muted} fontFamily="sans-serif">15</text></svg>
          </button>
          <button onClick={() => setPlaying(p => !p)} style={{
            width:72, height:72, borderRadius:"50%", border:"none", cursor:"pointer",
            background:`linear-gradient(135deg, ${session.color}, oklch(from ${session.color} calc(l - 0.08) c h))`,
            display:"flex", alignItems:"center", justifyContent:"center",
            boxShadow:`0 8px 24px oklch(from ${session.color} l c h / 0.35)`,
          }}>
            {playing
              ? <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><rect x="5" y="4" width="5" height="16" rx="1.5"/><rect x="14" y="4" width="5" height="16" rx="1.5"/></svg>
              : <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M7 4l14 8-14 8V4z"/></svg>
            }
          </button>
          <button onClick={() => setElapsed(e => Math.min(total, e+15))} style={{ background:c.card, border:"none", cursor:"pointer", width:44, height:44, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", backdropFilter:"blur(12px)" }}>
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke={c.muted} strokeWidth="1.8" strokeLinecap="round"><path d="M12 5v14M5 12l7 7 7-7"/></svg>
          </button>
        </div>

        {/* note */}
        <div style={{ background:c.card, borderRadius:20, padding:"16px 20px", width:"100%", backdropFilter:"blur(12px)", animation:"fadeUp 0.5s 0.3s ease both" }}>
          <div style={{ fontFamily:serif, fontSize:15, color:c.green, marginBottom:4 }}>Today's intention</div>
          <div style={{ fontFamily:sans, fontSize:13, color:c.muted, lineHeight:1.6 }}>Breathe gently. Let each exhale release what you no longer need to carry.</div>
        </div>
      </div>

      <div style={{ height:40 }}/>
    </div>
  );
}

// ── Home screen ───────────────────────────────────────────────
function HomeScreen({ tweaks, onPlay }) {
  const totalMins = 147;
  const streak = 7;
  const completedToday = 2;

  return (
    <div style={{ height:"100%", overflowY:"auto", background:c.bg, paddingBottom:60 }}>
      {/* header */}
      <div style={{ padding:"72px 24px 0", background:`linear-gradient(180deg, ${tweaks.bgDepth}08 0%, transparent 100%)` }}>
        <div style={{ fontFamily:sans, fontSize:13, color:c.muted, letterSpacing:"0.06em", textTransform:"uppercase", marginBottom:4 }}>Good morning</div>
        <div style={{ fontFamily:serif, fontSize:30, color:c.text, lineHeight:1.1 }}>Find your <em>stillness</em></div>
      </div>

      {/* streak card */}
      <div style={{ margin:"24px 20px 0", background:`linear-gradient(135deg, ${c.green}, ${c.blue})`, borderRadius:24, padding:"20px 24px", color:"#fff", position:"relative", overflow:"hidden" }}>
        <div style={{ position:"absolute", top:-20, right:-20, width:100, height:100, borderRadius:"50%", background:"rgba(255,255,255,0.08)" }}/>
        <div style={{ position:"absolute", bottom:-30, right:10, width:80, height:80, borderRadius:"50%", background:"rgba(255,255,255,0.05)" }}/>
        <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", position:"relative" }}>
          <div>
            <div style={{ fontFamily:sans, fontSize:12, opacity:0.75, letterSpacing:"0.05em", textTransform:"uppercase" }}>Current streak</div>

        </div>

        <div style={{ display:"flex", gap:8, marginTop:20, alignItems:"center" }}>
          {weekDays.map((d,i) => (
            <div key={i} style={{ flex:1, display:"flex", flexDirection:"column", alignItems:"center", gap:5 }}>
              <div style={{ width:28, height:28, borderRadius:"50%", background: weekDone[i] ? "rgba(255,255,255,0.9)" : "rgba(255,255,255,0.18)", display:"flex", alignItems:"center", justifyContent:"center" }}>
                {weekDone[i] && <svg width="10" height="8" viewBox="0 0 10 8"><path d="M1 4l3 3 5-6" stroke={c.green} strokeWidth="1.6" fill="none" strokeLinecap="round" strokeLinejoin="round"/></svg>}
              </div>
              <div style={{ fontFamily:sans, fontSize:10, opacity:0.7 }}>{d}</div>

      {/* continue */}
      <div style={{ padding:"28px 20px 0" }}>
        <div style={{ fontFamily:sans, fontSize:11, color:c.muted, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:14 }}>Continue</div>
        <div onClick={() => onPlay(sessions[0])} style={{ background:c.card, borderRadius:20, padding:"18px 20px", display:"flex", alignItems:"center", gap:16, cursor:"pointer", backdropFilter:"blur(12px)", border:`1px solid ${c.line}`, boxShadow:"0 2px 16px rgba(0,0,0,0.04)", transition:"transform 0.15s", }}
          onMouseDown={e=>e.currentTarget.style.transform="scale(0.98)"}
          onMouseUp={e=>e.currentTarget.style.transform="scale(1)"}
        >
          <div style={{ width:52, height:52, borderRadius:16, background:sessions[0].color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:24, flexShrink:0 }}>{sessions[0].icon}</div>
          <div style={{ flex:1, minWidth:0 }}>
            <div style={{ fontFamily:serif, fontSize:17, color:c.text }}>{sessions[0].title}</div>
            {tweaks.showSubtitles && <div style={{ fontFamily:sans, fontSize:12, color:c.muted, marginTop:2 }}>{sessions[0].subtitle}</div>}
            <div style={{ marginTop:8, background:c.line, borderRadius:4, height:4, overflow:"hidden" }}>
              <div style={{ height:"100%", borderRadius:4, background:sessions[0].color, width:`${sessions[0].progress*100}%`, transition:"width 0.6s ease" }}/>
            </div>
          </div>
          <div style={{ background:c.green, width:36, height:36, borderRadius:"50%", display:"flex", alignItems:"center", justifyContent:"center", flexShrink:0 }}>
            <svg width="12" height="14" viewBox="0 0 12 14" fill="white"><path d="M1 1l10 6-10 6V1z"/></svg>
          </div>
        </div>
      </div>

      {/* all sessions */}
      <div style={{ padding:"28px 20px 0" }}>
        <div style={{ fontFamily:sans, fontSize:11, color:c.muted, letterSpacing:"0.08em", textTransform:"uppercase", marginBottom:14 }}>All sessions</div>
        <div style={{ display:"flex", flexDirection:"column", gap:10 }}>
          {sessions.slice(1).map(s => (
            <div key={s.id} onClick={() => onPlay(s)}

            >
              <div style={{ width:44, height:44, borderRadius:14, background:s.color, display:"flex", alignItems:"center", justifyContent:"center", fontSize:20, flexShrink:0 }}>{s.icon}</div>
              <div style={{ flex:1, minWidth:0 }}>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"baseline" }}>
                  <div style={{ fontFamily:serif, fontSize:15, color:c.text }}>{s.title}</div>
                  <div style={{ fontFamily:sans, fontSize:11, color:c.muted, flexShrink:0, marginLeft:8 }}>{s.duration}</div>
                </div>
                {tweaks.showSubtitles && <div style={{ fontFamily:sans, fontSize:11, color:c.muted, marginTop:2, overflow:"hidden", textOverflow:"ellipsis", whiteSpace:"nowrap" }}>{s.subtitle}</div>}
                <div style={{ display:"flex", alignItems:"center", gap:8, marginTop:6 }}>

                  </div>

      </div>

}

// ── Tab bar ───────────────────────────────────────────────────
function TabBar({ active, onChange }) {
  const tabs = [
    { id:"home", label:"Home", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12L12 3l9 9"/><path d="M9 21V12h6v9"/></svg> },
    { id:"explore", label:"Explore", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="9"/><path d="M15 9l-4.5 1.5L9 15l4.5-1.5L15 9z"/></svg> },
    { id:"progress", label:"Progress", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg> },
    { id:"profile", label:"You", icon: <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg> },
  ];
  return (
    <div style={{ position:"absolute", bottom:0, left:0, right:0, height:78, background:"rgba(247,251,248,0.88)", backdropFilter:"blur(16px)", borderTop:`1px solid ${c.line}`, display:"flex", alignItems:"flex-start", paddingTop:10, paddingBottom:16, zIndex:50 }}>
      {tabs.map(t => (
        <button key={t.id} onClick={() => onChange(t.id)} style={{ flex:1, background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3, color: active===t.id ? c.green : c.muted, transition:"color 0.2s" }}>

          <span style={{ fontFamily:sans, fontSize:10, fontWeight: active===t.id ? 500 : 400 }}>{t.label}</span>

}

// ── App ───────────────────────────────────────────────────────
function App() {
  const [tweaks, setTweaks] = React.useState(() => {
    try { return { ...TWEAK_DEFAULTS, ...JSON.parse(localStorage.getItem("cs_tweaks") || "{}") }; }
    catch { return TWEAK_DEFAULTS; }
  });
  const [tab, setTab] = React.useState(() => localStorage.getItem("cs_tab") || "home");
  const [playing, setPlaying] = React.useState(null);
  const [showTweaks, setShowTweaks] = React.useState(false);

  React.useEffect(() => { localStorage.setItem("cs_tab", tab); }, [tab]);
  React.useEffect(() => { localStorage.setItem("cs_tweaks", JSON.stringify(tweaks)); }, [tweaks]);

  // Tweaks message bridge
  React.useEffect(() => {
    const handler = e => {
      if (e.data?.type === "__activate_edit_mode") setShowTweaks(true);
      if (e.data?.type === "__deactivate_edit_mode") setShowTweaks(false);
    };
    window.addEventListener("message", handler);
    window.parent.postMessage({ type: "__edit_mode_available" }, "*");
    return () => window.removeEventListener("message", handler);
  }, []);

  const updateTweak = (key, val) => {
    setTweaks(t => {
      const next = { ...t, [key]: val };
      window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: val } }, "*");
      return next;
    });
  };

  return (
    <div style={{ display:"flex", alignItems:"center", justifyContent:"center", minHeight:"100vh", padding:40, background:"oklch(0.96 0.02 160)" }}>
      <IOSDevice dark={false} width={393} height={852}>
        <div style={{ position:"relative", height:"100%" }}>
          {playing
            ? <PlayerScreen session={playing} onBack={() => setPlaying(null)}/>
            : <>
                {tab === "home"     && <HomeScreen tweaks={tweaks} onPlay={setPlaying}/>}
                {tab === "progress" && <ProgressScreen/>}
                {tab === "explore"  && (
                  <div style={{ height:"100%", display:"flex", alignItems:"center", justifyContent:"center", background:c.bg, flexDirection:"column", gap:12 }}>
                    <div style={{ fontSize:40 }}>🌿</div>
                    <div style={{ fontFamily:serif, fontSize:22, color:c.text }}>Coming soon</div>
                    <div style={{ fontFamily:sans, fontSize:13, color:c.muted }}>New sessions every week</div>
                  </div>
                )}
                {tab === "profile"  && (
                  <div style={{ height:"100%", display:"flex", alignItems:"center", justifyContent:"center", background:c.bg, flexDirection:"column", gap:12 }}>
                    <div style={{ width:72, height:72, borderRadius:"50%", background:`linear-gradient(135deg, ${c.green}, ${c.blue})`, display:"flex", alignItems:"center", justifyContent:"center", fontSize:28 }}>🧘</div>
                    <div style={{ fontFamily:serif, fontSize:22, color:c.text }}>Your profile</div>
                    <div style={{ fontFamily:sans, fontSize:13, color:c.muted }}>7-day streak • 24 sessions</div>
                  </div>
                )}
                <TabBar active={tab} onChange={setTab}/>
              </>
          }
        </div>
      </IOSDevice>

      {/* Tweaks panel */}
      {showTweaks && (
        <div style={{ position:"fixed", bottom:32, right:32, background:"white", borderRadius:20, padding:24, boxShadow:"0 12px 40px rgba(0,0,0,0.15)", width:240, zIndex:999, fontFamily:sans }}>
          <div style={{ fontWeight:500, fontSize:14, marginBottom:16, color:"#222" }}>Tweaks</div>
          <div style={{ display:"flex", flexDirection:"column", gap:14 }}>
            <label style={{ fontSize:12, color:"#555" }}>
              Accent (cyan)
              <input type="color" value="#7dd4d4" style={{ marginLeft:8 }} onChange={e => updateTweak("accentCyan", e.target.value)}/>
            </label>
            <label style={{ fontSize:12, color:"#555" }}>
              Accent (warm)
              <input type="color" value="#d4b87d" style={{ marginLeft:8 }} onChange={e => updateTweak("accentAmber", e.target.value)}/>
            </label>
            <label style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:"#555", alignItems:"center" }}>
              Show subtitles
              <input type="checkbox" checked={tweaks.showSubtitles} onChange={e => updateTweak("showSubtitles", e.target.checked)}/>
            </label>
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<div id="root"></div>
